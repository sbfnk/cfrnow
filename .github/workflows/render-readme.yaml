name: render-readme

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  render-readme:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: https://stan-dev.r-universe.dev

      # local::. installs cfrnow so the README's usage chunk runs; the fit chunk
      # is eval = FALSE, so no CmdStan toolchain is needed here.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::rmarkdown
          needs: readme

      - name: Render the README
        run: rmarkdown::render("README.Rmd")
        shell: Rscript {0}

      - name: Open a PR if the README changed
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Automatic README render"
          title: "Update README"
          body: "Automated re-render of README.md from README.Rmd."
          branch: "update-readme-${{ github.run_number }}"
          labels: "documentation"
          add-paths: README.md
          token: ${{ secrets.GITHUB_TOKEN }}
